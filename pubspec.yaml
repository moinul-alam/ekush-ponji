name: ekush_ponji
description: A Bengali calendar application with prayer times, events, reminders, and daily content
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^16.2.4

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2

  # Network
  dio: ^5.7.0

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # Localization
  flutter_localizations:
    sdk: flutter

  # Prayer Times
  adhan: ^2.0.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1

  # Code Generation
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.12
  riverpod_lint: ^3.0.0-dev.4

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/